services:
  db:
    image: postgres:15-alpine
    container_name: nexus_db
    environment:
      POSTGRES_USER: ${DB_USER:-nexus}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nexus123}
      POSTGRES_DB: ${DB_NAME:-nexus_panel}
    volumes:
      - nexus_db_data:/var/lib/postgresql/data
    networks:
      - nexus_network

  api:
    build: ./server
    container_name: nexus_api
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://${DB_USER:-nexus}:${DB_PASSWORD:-nexus123}@db:5432/${DB_NAME:-nexus_panel}
      JWT_SECRET: ${JWT_SECRET:-super-secret-key}
      PORT: 3005
    networks:
      - nexus_network

  bot:
    build: ./bot
    container_name: nexus_bot
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://${DB_USER:-nexus}:${DB_PASSWORD:-nexus123}@db:5432/${DB_NAME:-nexus_panel}
      POLL_INTERVAL: 15
    networks:
      - nexus_network

  nginx:
    build:
      context: ..
      dockerfile: ./deployment/frontend.Dockerfile
    container_name: nexus_nginx
    ports:
      - "80:80"
    environment:
      - VITE_SELF_HOSTED=true
      - VITE_API_URL=https://panel.nexus-x.site/api
    depends_on:
      - api
    networks:
      - nexus_network

networks:
  nexus_network:
    driver: bridge

volumes:
  nexus_db_data:
